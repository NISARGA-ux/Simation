services:
  - type: web
    name: simation
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 5000
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile